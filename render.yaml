services:
  - type: worker
    name: tiktok-rewards-bot
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPERATOR_USERNAME
        value: "@OldSIWs"
      - key: ADMIN_IDS
        sync: false
      - key: DB_PATH
        value: /data/bot_database.db
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
